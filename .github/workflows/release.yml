name: Build and Release Eloqua

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Free up disk space (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        docker image prune -a -f || true

    - name: Install FFmpeg (Windows)
      if: runner.os == 'Windows'
      uses: FedericoCarboni/setup-ffmpeg@v3
    
    - name: Install FFmpeg (macOS)
      if: runner.os == 'macOS'
      run: brew install ffmpeg
      
    - name: Install FFmpeg (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install pyinstaller openai-whisper opensmile spacy requests ffmpeg-python beautifulsoup4 googlesearch-python langgraph langchain-google-genai
        python -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu || python -m pip install torch torchvision torchaudio
        python -m spacy download en_core_web_sm
      shell: bash

    - name: Build Python Binaries (ML)
      run: |
        pyinstaller --onefile --name transcribe src/main/python/transcribe.py
        pyinstaller --onefile --name speech_analyzer src/main/python/speech_analyzer.py
        pyinstaller --onefile --name model_manager src/main/python/model_manager.py
        pyinstaller --onefile --name debate_chat src/main/python/debate_chat.py
        pyinstaller --onefile --name tabbycat_scraper src/main/python/tabbycat_scraper.py
      shell: bash

    - name: Build Python Binaries (Prep Agent - lightweight)
      run: |
        pyinstaller --onefile --name prep_agent \
          --exclude-module torch \
          --exclude-module torchvision \
          --exclude-module torchaudio \
          --exclude-module whisper \
          --exclude-module opensmile \
          --exclude-module spacy \
          --exclude-module numpy \
          --exclude-module scipy \
          --exclude-module sklearn \
          --exclude-module pandas \
          --exclude-module matplotlib \
          --strip \
          src/main/python/prep_agent.py
      shell: bash

    - name: Stage Binaries (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path resources/bin/win | Out-Null
        Copy-Item dist/transcribe.exe resources/bin/win/
        Copy-Item dist/speech_analyzer.exe resources/bin/win/
        Copy-Item dist/model_manager.exe resources/bin/win/
        Copy-Item dist/debate_chat.exe resources/bin/win/
        Copy-Item dist/tabbycat_scraper.exe resources/bin/win/
        Copy-Item dist/prep_agent.exe resources/bin/win/
        Copy-Item (Get-Command ffmpeg.exe).Source resources/bin/win/

    - name: Stage Binaries (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p resources/bin/mac
        cp dist/transcribe resources/bin/mac/
        cp dist/speech_analyzer resources/bin/mac/
        cp dist/model_manager resources/bin/mac/
        cp dist/debate_chat resources/bin/mac/
        cp dist/tabbycat_scraper resources/bin/mac/
        cp dist/prep_agent resources/bin/mac/
        cp "$(which ffmpeg)" resources/bin/mac/

    - name: Stage Binaries (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p resources/bin/linux
        cp dist/transcribe resources/bin/linux/
        cp dist/speech_analyzer resources/bin/linux/
        cp dist/model_manager resources/bin/linux/
        cp dist/debate_chat resources/bin/linux/
        cp dist/tabbycat_scraper resources/bin/linux/
        cp dist/prep_agent resources/bin/linux/
        cp "$(which ffmpeg)" resources/bin/linux/

    - name: Install dependencies
      run: npm ci
        
    - name: Build Vue app
      run: npm run build
      
    - name: Build Electron app
      run: npm run electron:dist
      
    - name: Compress large artifacts (Linux)
      if: runner.os == 'Linux'
      run: |
        cd dist-electron
        for f in *.AppImage; do
          if [ -f "$f" ]; then
            echo "Compressing $f..."
            gzip -9 "$f"
            mv "${f}.gz" "${f%.AppImage}.AppImage.gz"
          fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eloqua-${{ matrix.os }}
        path: |
          dist-electron/*.zip
          dist-electron/*.dmg
          dist-electron/*.exe
          dist-electron/*.AppImage
          dist-electron/*.AppImage.gz
        retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Clean Up Existing Assets
      uses: actions/github-script@v6
      with:
        script: |
          try {            
            if (!context.token) {
              return;
            }
            
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: process.env.GITHUB_REF_NAME
            });
            
            if (!release.data) {
              return;
            }
            
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id
            });
            
            for (const asset of assets.data) {
              if (["locale.pak", "Electron Framework", "snapshot_blob.bin", "v8_context_snapshot.bin"].includes(asset.name)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
              }
            }
          } catch (error) {
          }
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Ensure Release Exists
      run: |
        set -e
        echo "Ensuring release $GITHUB_REF_NAME exists..."
        if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
          gh release create "$GITHUB_REF_NAME" -t "Eloqua $GITHUB_REF_NAME" -n "Automated release"
        fi
      env:
        GH_TOKEN: ${{ github.token }}
        
    - name: Upload Assets with Delays
      run: |
        set -euo pipefail
        # Wait for release to be fully created
        sleep 10
        
        # Upload each file with delays and retry logic
        find artifacts -type f -maxdepth 3 | while read -r file; do
          if [[ "$file" == *"macOS"* ]] || [[ "$file" == *"Windows"* ]] || [[ "$file" == *"Linux"* ]] || [[ "$file" == *".exe"* ]] || [[ "$file" == *".dmg"* ]] || [[ "$file" == *".AppImage"* ]] || [[ "$file" == *".zip"* ]] || [[ "$file" == *".gz"* ]]; then
            echo "Uploading $file..."
            
            max_attempts=3
            attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt of $max_attempts for $file"
              if gh release upload "${GITHUB_REF_NAME}" "$file" --clobber; then
                echo "Successfully uploaded $file"
                break
              else
                echo "Upload failed for $file (attempt $attempt)"
                if [ $attempt -eq $max_attempts ]; then
                  echo "WARNING: Failed to upload $file after $max_attempts attempts, skipping."
                  break
                fi
                attempt=$((attempt + 1))
                sleep 30
              fi
            done
            
            sleep 15
          fi
        done
      env:
        GH_TOKEN: ${{ github.token }}
